site_name: SocraticArgument
site_description: Socratic debate notes and arguments
site_url: https://abvstudio-net.github.io/SocraticArgument/
repo_url: https://github.com/abvstudio-net/SocraticArgument
repo_name: abvstudio-net/SocraticArgument

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - How to debate: how-to-debate/SKILL.md
  - Examples:
    - Vibecoding: how-to-debate/examples/vibecoding.md
  - Topics:
    - Israel:
      - Initial position: ISRAEL/initial-position.md
      - Initial questions: ISRAEL/initial-questions.md
      - Initial reply: ISRAEL/initial-reply.md
      - Suggested edits: ISRAEL/suggested-edits.md
      - Argument: ISRAEL/argument.md
      - Red herring: ISRAEL/red-herring.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

plugins:
  - search
